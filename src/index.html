<html lang="en">

<head>
  <meta charset="utf-8">
  <base href="/">
  <meta content="width=device-width, initial-scale=1, shrink-to-fit=no" name="viewport" />
  <meta content="StageConnect - Plateforme de mise en relation pour les stages au Cameroun" name="description" />
  <meta content="Bilogue Seme" name="author" />
  <meta content="StageConnect - Plateforme de mise en relation pour les stages au Cameroun" name="keyword" />
  <link href="/assets/logo.png" rel="icon" type="image/png">
  <title>StageConnect - Plateforme de mise en relation pour les stages au Cameroun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    #initial-loader {
      text-align: center;
      padding-top: calc(100vh / 2);
      height: 100vh;
      transition: background-color 0.3s ease;
    }

    .dark-theme #initial-loader {
      background-color: #1a222c;
      color: white;
    }

    .light-theme #initial-loader {
      background-color: #f8f9fa;
      color: #1a222c;
    }

    #initial-loader .spinner-grow {
      color: #004a99 !important;
    }
  </style>
  <script>
    (function () {
      const theme = localStorage.getItem('coreui-free-angular-admin-template-theme-default') || 'auto';
      const isDark = theme === 'dark' || (theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.add(isDark ? 'dark-theme' : 'light-theme');
    })();
  </script>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <app-root>
    <div id="initial-loader" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; padding-top: 0;">
      <div class="mb-4 text-center">
        <img src="/assets/logo.png" style="width: 120px; height: 120px; object-fit: contain;" alt="StageConnect Logo">
      </div>
      <div class="text-center">
        <div class="spinner-grow spinner-grow-sm" role="status"></div>
        <span class="ms-2 fw-bold">Chargement...</span>
      </div>
    </div>
  </app-root>
</body>

</html>
