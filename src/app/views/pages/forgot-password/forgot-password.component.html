<div class="vh-100 d-flex flex-row align-items-stretch overflow-hidden"
  [style.backgroundColor]="colorMode() === 'dark' ? '#1a222c' : '#f8f9fa'">
  <div class="flex-grow-1 d-none d-lg-block position-relative overflow-hidden animate-fade-in"
    style="background: linear-gradient(rgba(26, 34, 44, 0.45), rgba(26, 34, 44, 0.65)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&q=80&w=1600') center/cover no-repeat;">
    <div class="h-100 d-flex flex-column align-items-center justify-content-center text-center px-5 text-white">
      <img src="assets/logo.png" style="width: 140px; height: 140px; object-fit: contain;" alt="StageConnect Logo" class="mb-4 shadow-lg">
      <h2 class="display-5 fw-bold mb-4">Réinitialisation sécurisée</h2>
    </div>
  </div>

  <div class="flex-grow-1 d-flex flex-column justify-content-center px-4 px-md-5 animate-slide-right shadow-lg"
    [style.backgroundColor]="colorMode() === 'dark' ? '#24303f' : '#ffffff'" style="max-width: 640px; z-index: 10;">
    <div class="mx-auto w-100" style="max-width: 420px;">
      <div class="mb-4 d-flex align-items-center">
        <img src="assets/logo.png" class="me-3" style="width: 54px; height: 54px; object-fit: contain;" alt="StageConnect">
        <div>
          <h1 class="h2 mb-0 fw-bold" [class.text-white]="colorMode() === 'dark'">Mot de passe oublié</h1>
        </div>
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger border-0 small py-2 mb-3 shadow-sm">
          {{ errorMessage }}
        </div>
      }

      @if (successMessage) {
        <div class="alert alert-success border-0 small py-2 mb-3 shadow-sm">
          {{ successMessage }}
        </div>
      }

      @if (!hasToken()) {
      <form cForm (ngSubmit)="onRequestReset()" class="mb-4">
        <label class="form-label small fw-bold mb-2 opacity-75 text-uppercase tracking-wider"
          [class.text-white]="colorMode() === 'dark'">Adresse Email</label>
        <c-input-group class="border-0 shadow-sm rounded overflow-hidden mb-3">
          <span class="input-group-text border-0" [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'">
            <svg cIcon name="cilEnvelopeOpen" [class.text-white]="colorMode() === 'dark'"></svg>
          </span>
          <input name="email" [(ngModel)]="email" autoComplete="email" cFormControl placeholder="contact@entreprise.com"
            class="py-3 px-3 border-0" [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'"
            [style.color]="colorMode() === 'dark' ? 'white' : 'black'" />
        </c-input-group>
        <button cButton type="submit" [disabled]="isRequesting" class="w-100 py-3 fw-bold text-white border-0"
          style="background-color: #004a99;">
          {{ isRequesting ? 'Envoi...' : 'Recevoir le lien de réinitialisation' }}
        </button>
      </form>
      }

      @if (hasToken()) {
      <form cForm (ngSubmit)="onConfirmReset()">
        <label class="form-label small fw-bold mb-2 opacity-75 text-uppercase tracking-wider"
          [class.text-white]="colorMode() === 'dark'">Nouveau mot de passe</label>
        <c-input-group class="border-0 shadow-sm rounded overflow-hidden mb-3">
          <span class="input-group-text border-0" [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'">
            <svg cIcon name="cilLockLocked" [class.text-white]="colorMode() === 'dark'"></svg>
          </span>
          <input name="newPassword" [(ngModel)]="newPassword" [type]="showNewPassword ? 'text' : 'password'" autoComplete="new-password" cFormControl
            placeholder="••••••••" class="py-3 px-3 border-0"
            [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'"
            [style.color]="colorMode() === 'dark' ? 'white' : 'black'" />
          <button type="button" class="input-group-text border-0"
            (click)="togglePasswordVisibility('new')"
            [attr.aria-label]="showNewPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'">
            <svg cIcon [name]="showNewPassword ? 'cilLockUnlocked' : 'cilLowVision'" [class.text-white]="colorMode() === 'dark'"></svg>
          </button>
        </c-input-group>

        <label class="form-label small fw-bold mb-2 opacity-75 text-uppercase tracking-wider"
          [class.text-white]="colorMode() === 'dark'">Confirmer le mot de passe</label>
        <c-input-group class="border-0 shadow-sm rounded overflow-hidden mb-4">
          <span class="input-group-text border-0" [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'">
            <svg cIcon name="cilLockLocked" [class.text-white]="colorMode() === 'dark'"></svg>
          </span>
          <input name="confirmPassword" [(ngModel)]="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'" autoComplete="new-password" cFormControl
            placeholder="••••••••" class="py-3 px-3 border-0"
            [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'"
            [style.color]="colorMode() === 'dark' ? 'white' : 'black'" />
          <button type="button" class="input-group-text border-0"
            (click)="togglePasswordVisibility('confirm')"
            [attr.aria-label]="showConfirmPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
            [style.backgroundColor]="colorMode() === 'dark' ? '#1d2a39' : '#f0f2f5'">
            <svg cIcon [name]="showConfirmPassword ? 'cilLockUnlocked' : 'cilLowVision'" [class.text-white]="colorMode() === 'dark'"></svg>
          </button>
        </c-input-group>

        <button cButton type="submit" [disabled]="isResetting" class="w-100 py-3 fw-bold text-white mb-3 border-0"
          style="background-color: #f7941e;">
          {{ isResetting ? 'Réinitialisation...' : 'Confirmer le nouveau mot de passe' }}
        </button>
      </form>
      }

      <p class="text-center opacity-75 mb-0" [class.text-white]="colorMode() === 'dark'">
        Retour à la <a routerLink="/login" class="text-decoration-none fw-bold ms-1" style="color: #f7941e;">connexion</a>
      </p>
    </div>
  </div>

  <button (click)="toggleTheme()"
    class="btn rounded-circle shadow-lg position-fixed bottom-0 end-0 m-4 d-flex align-items-center justify-content-center animate-fade-in"
    style="width: 56px; height: 56px; z-index: 1050; border: none; background-color: #004a99; color: white;">
    <svg cIcon [name]="currentIcon()" height="24"></svg>
  </button>
</div>
