<div class="min-vh-100 d-flex flex-row align-items-center animate-fade-in" 
     [style.backgroundColor]="colorMode() === 'dark' ? '#1a222c' : '#f8f9fa'"
     [style.color]="colorMode() === 'dark' ? '#ffffff' : '#1a222c'">
  <c-container>
    <c-row class="justify-content-center">
      <c-col md="8" class="text-center">
        <div class="mb-5 animate-slide-left">
          <h1 class="display-1 fw-bold mb-0" style="color: #004a99; font-size: 8rem;">404</h1>
          <h2 class="h2 fw-bold">Oups ! Vous semblez perdu.</h2>
          <p class="lead opacity-75 mt-3">
            La page que vous recherchez n'existe pas ou a été déplacée.
          </p>
        </div>
        
        <div class="animate-fade-in" style="animation-delay: 0.5s;">
           <a cButton 
              routerLink="/dashboard" 
              class="px-5 py-3 fw-bold shadow-sm border-0 d-inline-flex align-items-center"
              style="background-color: #004a99; color: white; border-radius: 0.5rem; transition: transform 0.2s;">
              <svg cIcon name="cilHome" class="me-2" height="20"></svg>
              Retour au Tableau de Bord
           </a>
        </div>
      </c-col>
    </c-row>
  </c-container>
</div>
