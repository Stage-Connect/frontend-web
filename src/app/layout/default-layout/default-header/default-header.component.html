<!--<c-header class="mb-4 d-print-none" position="sticky">-->
<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4">
    <button [cSidebarToggle]="sidebarId()" cHeaderToggler class="btn" toggle="visible"
      style="margin-inline-start: -14px;" aria-label="Toggle sidebar navigation">
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>
    <c-header-nav class="d-none d-md-flex">
      <c-nav-item>
        <a cNavLink routerLink="/dashboard" class="fw-bold">StageConnect</a>
      </c-nav-item>
    </c-header-nav>

    <c-header-nav class="d-none d-md-flex ms-auto ">
      <a cNavLink>
        <svg cIcon class="my-1" name="cilBell" size="lg"></svg>
      </a>

    </c-header-nav>

    <c-header-nav class="ms-auto ms-md-0">
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
      <ng-container *ngTemplateOutlet="themeDropdown" />
      <div class="nav-item py-1">
        <div class="vr h-100 mx-2 text-body text-opacity-75"></div>
      </div>
    </c-header-nav>

    <c-header-nav class="mx-0">
      <ng-container *ngTemplateOutlet="userDropdown" />
    </c-header-nav>

  </c-container>
  <c-container [fluid]="true" class="px-4">
    <c-breadcrumb-router />
  </c-container>
</ng-container>
<!--</c-header>-->

<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-start' }" variant="nav-item">
    <button [caret]="false" cDropdownToggle class="py-0 pe-0 border-0 bg-transparent" aria-label="Open user menu">
      <c-avatar shape="rounded-circle" size="md" src="./assets/images/avatars/8.jpg" status="success"
        alt="User avatar" />
    </button>
    <ul cDropdownMenu class="pt-0 w-auto shadow-lg border-0 rounded-3 mt-2" [style.backgroundColor]="colorMode() === 'dark' ? '#24303f' : '#ffffff'" style="min-width: 200px;">
      <li>
        <h6 cDropdownHeader class="fw-bold py-3 px-4 border-bottom" [style.color]="colorMode() === 'dark' ? '#8a99af' : '#64748b'" [style.borderColor]="colorMode() === 'dark' ? '#3d4d60' : 'rgba(0,0,0,0.1)'">
          ADMINISTRATION
        </h6>
      </li>
      <li>
        <a cDropdownItem routerLink="/dashboard/entreprise/profil" class="py-2 px-4 d-flex align-items-center dropdown-item-sc" [class.text-white]="colorMode() === 'dark'" [class.text-dark]="colorMode() === 'light'">
          <svg cIcon class="me-3" name="cilUser"></svg>
          Mon Profil
        </a>
      </li>
      <li>
        <a cDropdownItem routerLink="/settings" class="py-2 px-4 d-flex align-items-center dropdown-item-sc" [class.text-white]="colorMode() === 'dark'" [class.text-dark]="colorMode() === 'light'">
          <svg cIcon class="me-3" name="cilSettings"></svg>
          Paramètres
        </a>
      </li>
      <li>
        <hr cDropdownDivider class="my-0" [style.borderColor]="colorMode() === 'dark' ? '#3d4d60' : 'rgba(0,0,0,0.1)'" />
      </li>
      <li>
        <a cDropdownItem (click)="logout()" style="cursor: pointer;" class="text-danger py-2 px-4 d-flex align-items-center dropdown-item-sc">
          <svg cIcon class="me-3 font-bold" name="cilAccountLogout"></svg>
          Déconnexion
        </a>
      </li>
    </ul>
  </c-dropdown>
</ng-template>

<ng-template #themeDropdown>
  <c-dropdown alignment="end" variant="nav-item">
    <button [caret]="false" cDropdownToggle aria-label="Open theme picker">
      <svg cIcon [name]="icons()" size="lg"></svg>
    </button>
    <div cDropdownMenu class="pt-0 shadow-lg border-0 rounded-3 mt-2 overflow-hidden" [style.backgroundColor]="colorMode() === 'dark' ? '#24303f' : '#ffffff'">
      @for (mode of colorModes; track mode.name) {
      <button (click)="colorMode.set(mode.name)" [active]="colorMode()===mode.name" cDropdownItem
        class="d-flex align-items-center dropdown-item-sc py-2 px-4 w-100 border-0 bg-transparent"
        [class.text-white]="colorMode() === 'dark'" [class.text-dark]="colorMode() === 'light'">
        <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
        {{ mode.text }}
      </button>
      }
    </div>
  </c-dropdown>
</ng-template>
